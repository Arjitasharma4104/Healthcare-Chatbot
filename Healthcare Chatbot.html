<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiaBuddy — Diabetes AI Health Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-dark: #0F6E56;
    --teal-mid: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-soft: #9FE1CB;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1a2332;
    --muted: #6b7a8d;
    --border: #e2e8f0;
    --danger: #e24b4a;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: radial-gradient(circle at 20% 80%, rgba(29,158,117,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 20%, rgba(15,110,86,0.06) 0%, transparent 50%);
  }

  /* ── AUTH SCREENS ── */
  #auth-screen {
    width: 100%;
    max-width: 480px;
  }

  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .auth-logo .logo-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    box-shadow: 0 8px 24px rgba(29,158,117,0.3);
  }

  .auth-logo .logo-icon svg { width: 36px; height: 36px; }

  .auth-logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .auth-logo p {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--teal-mid);
    text-transform: uppercase;
    margin-top: 2px;
  }

  .auth-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 36px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
  }

  .auth-tabs {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 28px;
  }

  .auth-tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-tab.active {
    background: var(--white);
    color: var(--teal-dark);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .form-group { margin-bottom: 18px; }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    appearance: none;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--teal-mid);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
  }

  .form-group input::placeholder { color: #a0aab4; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .score-row input[type="number"] { flex: 1; }

  .score-badge {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .score-badge.normal { background: #eaf3de; color: #3b6d11; }
  .score-badge.prediabetes { background: #faeeda; color: #854f0b; }
  .score-badge.diabetes { background: #fcebeb; color: #a32d2d; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(29,158,117,0.3);
    margin-top: 8px;
  }

  .btn-primary:hover { opacity: 0.92; }
  .btn-primary:active { transform: scale(0.99); }

  .error-msg {
    background: #fcebeb;
    color: #a32d2d;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  /* ── CHAT SCREEN ── */
  #chat-screen {
    display: none;
    width: 100%;
    max-width: 520px;
    height: 90vh;
    max-height: 760px;
    flex-direction: column;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .chat-header {
    background: linear-gradient(135deg, var(--teal-dark) 0%, #1D9E75 100%);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .chat-header-avatar {
    width: 46px;
    height: 46px;
    background: rgba(255,255,255,0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .chat-header-info { flex: 1; }

  .chat-header-info h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: white;
    letter-spacing: -0.3px;
  }

  .chat-header-info p {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    margin-top: 1px;
  }

  .online-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
  }

  .online-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(74,222,128,0.6);
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .user-info-bar {
    background: var(--teal-light);
    padding: 10px 22px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(29,158,117,0.12);
    flex-shrink: 0;
  }

  .user-info-bar span {
    font-size: 12px;
    color: var(--teal-dark);
    font-weight: 500;
  }

  .user-chip {
    background: rgba(15,110,86,0.12);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--teal-dark);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
    background: #f8fafb;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  .msg-avatar.bot {
    background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
    color: white;
  }

  .msg-avatar.user-av {
    background: linear-gradient(135deg, #534AB7, #7F77DD);
    color: white;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  .bubble.bot {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
    color: white;
    border-radius: 16px 4px 16px 16px;
  }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul { padding-left: 18px; margin: 6px 0; }
  .bubble ul li { margin-bottom: 4px; }
  .bubble strong { font-weight: 600; }

  .msg-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 4px;
  }

  .msg-wrap.user .msg-time { text-align: right; }

  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 14px 16px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px;
    width: fit-content;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--teal-mid);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .quick-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 20px 14px;
    background: #f8fafb;
    flex-shrink: 0;
  }

  .chip {
    padding: 7px 14px;
    background: var(--white);
    border: 1px solid var(--teal-soft);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--teal-dark);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover {
    background: var(--teal-light);
    border-color: var(--teal-mid);
  }

  .chat-input-area {
    padding: 14px 18px 16px;
    border-top: 1px solid var(--border);
    background: var(--white);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--teal-mid);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.1);
    background: var(--white);
  }

  #user-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    min-width: 0;
  }

  #user-input::placeholder { color: #a0aab4; }

  #send-btn {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--teal-dark), var(--teal-mid));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 12px rgba(29,158,117,0.3);
  }

  #send-btn:hover { opacity: 0.9; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .disclaimer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .logout-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    padding: 4px;
    transition: color 0.2s;
    display: flex;
  }
  .logout-btn:hover { color: white; }
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 4C10.268 4 4 10.268 4 18s6.268 14 14 14 14-6.268 14-14S25.732 4 18 4z" fill="rgba(255,255,255,0.15)"/>
        <path d="M18 8a2 2 0 0 1 2 2v6h6a2 2 0 0 1 0 4h-6v6a2 2 0 0 1-4 0v-6h-6a2 2 0 0 1 0-4h6v-6a2 2 0 0 1 2-2z" fill="white"/>
      </svg>
    </div>
    <h1>DiaBuddy</h1>
    <p>Diabetes AI Health Assistant</p>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('signup')">Create Account</button>
      <button class="auth-tab" onclick="showTab('login')">Sign In</button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <!-- SIGNUP FORM -->
    <div id="signup-form">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="s-fname" placeholder="Arjun" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="s-lname" placeholder="Sharma" />
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="s-email" placeholder="arjun@example.com" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="s-phone" placeholder="+91 98765 43210" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="s-pass" placeholder="Create a password" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Diabetes Type</label>
          <select id="s-dtype">
            <option value="">Select type</option>
            <option value="Type 1">Type 1</option>
            <option value="Type 2">Type 2</option>
            <option value="Prediabetes">Prediabetes</option>
            <option value="Gestational">Gestational</option>
            <option value="Not diagnosed">Not diagnosed</option>
          </select>
        </div>
        <div class="form-group">
          <label>HbA1c Score (%)</label>
          <div class="score-row">
            <input type="number" id="s-score" placeholder="e.g. 7.2" step="0.1" min="4" max="15" oninput="updateScoreBadge(this)" />
          </div>
          <div id="score-badge" class="score-badge" style="display:none;margin-top:6px;text-align:center"></div>
        </div>
      </div>
      <button class="btn-primary" onclick="handleSignup()">Create My Account →</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" style="display:none">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="arjun@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Your password" />
      </div>
      <button class="btn-primary" onclick="handleLogin()">Sign In →</button>
    </div>
  </div>
</div>

<!-- ══ CHAT SCREEN ══ -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="chat-header-avatar">
      <svg width="26" height="26" viewBox="0 0 36 36" fill="none">
        <path d="M18 8a2 2 0 0 1 2 2v6h6a2 2 0 0 1 0 4h-6v6a2 2 0 0 1-4 0v-6h-6a2 2 0 0 1 0-4h6v-6a2 2 0 0 1 2-2z" fill="white"/>
      </svg>
    </div>
    <div class="chat-header-info">
      <h2>DiaBuddy</h2>
      <p>Diabetes AI Health Assistant</p>
    </div>
    <div class="online-badge">
      <div class="online-dot"></div>
      Online
    </div>
    <button class="logout-btn" onclick="logout()" title="Sign out">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
  </div>

  <div class="user-info-bar">
    <svg width="14" height="14" fill="none" stroke="#0F6E56" stroke-width="2" viewBox="0 0 24 24">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
    </svg>
    <span id="header-name">—</span>
    <div class="user-chip" id="header-dtype">—</div>
    <div class="user-chip" id="header-score">—</div>
  </div>

  <div id="messages"></div>

  <div class="quick-chips" id="quick-chips">
    <div class="chip" onclick="sendChip(this)">🥗 Diet plan</div>
    <div class="chip" onclick="sendChip(this)">🏃 Exercise tips</div>
    <div class="chip" onclick="sendChip(this)">📈 High blood sugar</div>
    <div class="chip" onclick="sendChip(this)">💊 Medication info</div>
    <div class="chip" onclick="sendChip(this)">🧠 Mental health</div>
  </div>

  <div class="chat-input-area">
    <div class="input-row">
      <input type="text" id="user-input" placeholder="Ask about diet, exercise, blood sugar..." onkeydown="if(event.key==='Enter')sendMessage()" />
      <button id="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="disclaimer">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      For educational purposes only — not a substitute for professional medical advice.
    </div>
  </div>
</div>

<script>
// ── USER STORE ──
let users = JSON.parse(localStorage.getItem('dbu') || '[]');
let currentUser = JSON.parse(localStorage.getItem('dbc') || 'null');
let chatHistory = [];

// ── AUTH ──
function showTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='signup')||(i===1&&tab==='login')));
  document.getElementById('signup-form').style.display = tab==='signup'?'block':'none';
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }

function updateScoreBadge(inp) {
  const val = parseFloat(inp.value);
  const badge = document.getElementById('score-badge');
  if (!inp.value) { badge.style.display='none'; return; }
  badge.style.display = 'block';
  if (val < 5.7) { badge.className='score-badge normal'; badge.textContent='Normal ✓'; }
  else if (val < 6.5) { badge.className='score-badge prediabetes'; badge.textContent='Prediabetes ⚠'; }
  else { badge.className='score-badge diabetes'; badge.textContent='Diabetes ●'; }
}

function handleSignup() {
  hideError();
  const fname = document.getElementById('s-fname').value.trim();
  const lname = document.getElementById('s-lname').value.trim();
  const email = document.getElementById('s-email').value.trim().toLowerCase();
  const phone = document.getElementById('s-phone').value.trim();
  const pass = document.getElementById('s-pass').value;
  const dtype = document.getElementById('s-dtype').value;
  const score = document.getElementById('s-score').value;

  if (!fname||!lname) return showError('Please enter your full name.');
  if (!email||!email.includes('@')) return showError('Please enter a valid email address.');
  if (!phone) return showError('Please enter your phone number.');
  if (pass.length < 6) return showError('Password must be at least 6 characters.');
  if (!dtype) return showError('Please select your diabetes type.');
  if (!score) return showError('Please enter your HbA1c score.');
  if (users.find(u=>u.email===email)) return showError('An account with this email already exists.');

  const user = { name: fname+' '+lname, fname, email, phone, pass, dtype, score: parseFloat(score) };
  users.push(user);
  localStorage.setItem('dbu', JSON.stringify(users));
  loginUser(user);
}

function handleLogin() {
  hideError();
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass = document.getElementById('l-pass').value;
  if (!email||!pass) return showError('Please fill in all fields.');
  const user = users.find(u=>u.email===email&&u.pass===pass);
  if (!user) return showError('Invalid email or password.');
  loginUser(user);
}

function loginUser(user) {
  currentUser = user;
  localStorage.setItem('dbc', JSON.stringify(user));
  launchChat();
}

function logout() {
  localStorage.removeItem('dbc');
  currentUser = null;
  chatHistory = [];
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'block';
  document.getElementById('messages').innerHTML = '';
}

// ── CHAT ──
function launchChat() {
  document.getElementById('auth-screen').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';

  document.getElementById('header-name').textContent = currentUser.name;
  document.getElementById('header-dtype').textContent = currentUser.dtype;
  const sc = currentUser.score;
  let label = sc < 5.7 ? `HbA1c ${sc}% ✓` : sc < 6.5 ? `HbA1c ${sc}% ⚠` : `HbA1c ${sc}% ●`;
  document.getElementById('header-score').textContent = label;

  const msgs = document.getElementById('messages');
  if (msgs.children.length === 0) {
    const hour = new Date().getHours();
    const greet = hour<12 ? 'Good morning' : hour<17 ? 'Good afternoon' : 'Good evening';
    showBotMsg(`${greet}, **${currentUser.fname}**! 👋 I'm DiaBuddy, your personal diabetes health companion.

I can help you with:
• 🥗 **Diet** & meal plans
• 🏃 **Exercise** recommendations
• 📈 **High blood sugar** advice
• 📉 **Low blood sugar** advice
• 🔍 **Symptoms** & diabetes types
• 💊 **Medication** info
• 🧠 **Mental health** & coping

Just type a question below to get started! 😊`);
  }
}

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function showBotMsg(text, typing=false) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';

  const av = document.createElement('div');
  av.className = 'msg-avatar bot';
  av.textContent = 'D';

  const col = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';

  if (typing) {
    bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    wrap.id = 'typing-bubble';
  } else {
    bubble.innerHTML = formatMsg(text);
    const tm = document.createElement('div');
    tm.className = 'msg-time';
    tm.textContent = getTime();
    col.appendChild(bubble);
    col.appendChild(tm);
  }

  if (typing) col.appendChild(bubble);
  wrap.appendChild(av);
  wrap.appendChild(col);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function showUserMsg(text) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';

  const av = document.createElement('div');
  av.className = 'msg-avatar user-av';
  av.textContent = currentUser.fname[0].toUpperCase();

  const col = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.innerHTML = `<p>${escHtml(text)}</p>`;
  const tm = document.createElement('div');
  tm.className = 'msg-time';
  tm.textContent = getTime();

  col.appendChild(bubble);
  col.appendChild(tm);
  wrap.appendChild(col);
  wrap.appendChild(av);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function formatMsg(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n•/g, '<br>•')
    .split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const inp = document.getElementById('user-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('quick-chips').style.display = 'none';

  showUserMsg(text);
  chatHistory.push({ role:'user', content: text });

  const typingEl = showBotMsg('', true);

  try {
    const systemPrompt = `You are DiaBuddy, a warm, knowledgeable, and empathetic diabetes health assistant. You provide personalized, evidence-based guidance to people managing diabetes.

Current user profile:
- Name: ${currentUser.name}
- Diabetes Type: ${currentUser.dtype}
- HbA1c Score: ${currentUser.score}%

Based on this profile, tailor ALL your responses specifically for this user. For example, if they have Type 2 diabetes with HbA1c of 8.5%, give advice appropriate for that level.

You help with: diet plans, meal suggestions, exercise routines, blood sugar management, medication info, symptoms, mental health, and lifestyle tips.

Rules:
- Always be warm, supportive, and encouraging
- Use bullet points and bold text for clarity
- Remind users to consult their doctor for medical decisions
- Keep responses concise but helpful (150–300 words max)
- Address the user by first name occasionally
- Use emojis sparingly but effectively
- Never diagnose; always recommend professional consultation for medical issues`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || "I'm sorry, I couldn't process that. Please try again!";

    typingEl.remove();
    showBotMsg(reply);
    chatHistory.push({ role:'assistant', content: reply });

  } catch (e) {
    typingEl.remove();
    showBotMsg("Oops! I'm having trouble connecting right now. Please check your connection and try again. 🔄");
    console.error(e);
  }

  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

function sendChip(el) {
  document.getElementById('user-input').value = el.textContent.replace(/^[^ ]+ /,'');
  sendMessage();
}

// ── INIT ──
if (currentUser) launchChat();
</script>
</body>
</html>
